<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#C8541A" />
  <meta name="description" content="TFO One - Textile Factory ERP for Tamil Nadu TFO Owners" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TFO One" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon (SVG) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Tabler Icons — loaded via HTML link to avoid Edge tracking-prevention storage warnings -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"
    crossorigin="anonymous" />

  <!-- Google Fonts — DM Sans + Noto Sans Tamil -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600&display=swap"
    rel="stylesheet" crossorigin="anonymous" />

  <title>TFO One</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      background: #EADCD0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Skip service worker in local development to avoid stale caching of source files
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister();
            }
          });
        } else {
          navigator.serviceWorker.register('/sw.js').catch(() => { });
        }
      });
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
